spring:
  datasource:
    url: jdbc:postgresql://circleguard-postgres.circleguard-prod.svc.cluster.local:5432/circleguard_promotion
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
  neo4j:
    uri: bolt://circleguard-neo4j.circleguard-prod.svc.cluster.local:7687
  kafka:
    bootstrap-servers: circleguard-kafka.circleguard-prod.svc.cluster.local:9092
  data:
    redis:
      host: circleguard-redis-master.circleguard-prod.svc.cluster.local

logging:
  level:
    root: WARN
    com.circleguard: INFO
