spring:
  application:
    name: circleguard-dashboard-service
  datasource:
    driver-class-name: org.postgresql.Driver
    # URL will be overridden by @DynamicPropertySource
    url: jdbc:postgresql://localhost:5432/circleguard_dashboard_test
    username: admin
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 0  # Random port for testing

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
