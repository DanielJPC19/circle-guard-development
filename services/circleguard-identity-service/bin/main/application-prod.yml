spring:
  datasource:
    url: jdbc:postgresql://circleguard-postgres.circleguard-prod.svc.cluster.local:5432/circleguard_identity
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: WARN
    com.circleguard: INFO
