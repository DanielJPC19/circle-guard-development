spring:
  datasource:
    url: jdbc:postgresql://circleguard-postgres.circleguard-prod.svc.cluster.local:5432/circleguard_auth
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
  ldap:
    urls: ldap://circleguard-openldap.circleguard-prod.svc.cluster.local:389

logging:
  level:
    root: WARN
    com.circleguard: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: never
