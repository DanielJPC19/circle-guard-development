name: CI — Release (Staging)

on:
  push:
    branches: ['release/**']

env:
  ACR_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  build-and-test:
    name: Build, Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Start test infrastructure
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Build all services
        run: ./gradlew bootJar --parallel -x test

      - name: Run unit tests
        run: ./gradlew unitTest --parallel

      - name: Run integration tests
        run: ./gradlew integrationTest --parallel

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport --parallel

      - name: Stop test infrastructure
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/build/reports/jacoco/test/jacocoTestReport.xml'

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: jacoco-reports

      - name: SonarQube Analysis
        run: |
          ./gradlew sonarqube \
            -Dsonar.projectKey=circleguard \
            -Dsonar.host.url=${{ secrets.SONARQUBE_URL }} \
            -Dsonar.login=${{ secrets.SONARQUBE_TOKEN }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

  trivy-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        service:
          - circleguard-auth-service
          - circleguard-identity-service
          - circleguard-promotion-service
          - circleguard-notification-service
          - circleguard-form-service
          - circleguard-gateway-service
          - circleguard-dashboard-service
          - circleguard-file-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar -x test

      - name: Build Docker image
        run: |
          JAR=$(find services/${{ matrix.service }}/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            --build-arg JAR_FILE=${JAR} \
            -t ${{ matrix.service }}:scan .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.service }}:scan'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

  push-to-acr:
    name: Push Staging Images to ACR
    runs-on: ubuntu-latest
    needs: [sonarqube, trivy-scan]
    outputs:
      short_sha: ${{ steps.vars.outputs.SHORT_SHA }}
    strategy:
      matrix:
        service:
          - circleguard-auth-service
          - circleguard-identity-service
          - circleguard-promotion-service
          - circleguard-notification-service
          - circleguard-form-service
          - circleguard-gateway-service
          - circleguard-dashboard-service
          - circleguard-file-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar -x test

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push staging image
        run: |
          JAR=$(find services/${{ matrix.service }}/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/circleguard/${{ matrix.service }}:staging-${{ steps.vars.outputs.SHORT_SHA }}"
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            --build-arg JAR_FILE=${JAR} \
            -t ${IMAGE} \
            --label "git.sha=${GITHUB_SHA}" \
            --label "git.branch=${GITHUB_REF_NAME}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .
          docker push ${IMAGE}
          echo "Pushed: ${IMAGE}"

  trigger-jenkins-staging:
    name: Trigger Jenkins CD — Staging
    runs-on: ubuntu-latest
    needs: push-to-acr
    steps:
      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Trigger Jenkins Staging Pipeline
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.JENKINS_STAGING_URL }}/job/circleguard-staging/buildWithParameters" \
            --user "ci:${{ secrets.JENKINS_TOKEN }}" \
            --data-urlencode "IMAGE_TAG=staging-${{ steps.vars.outputs.SHORT_SHA }}" \
            --data-urlencode "ENVIRONMENT=staging")
          echo "Jenkins response: $RESPONSE"
          if [ "$RESPONSE" != "201" ]; then
            echo "Failed to trigger Jenkins staging pipeline"
            exit 1
          fi

      - name: Wait for Jenkins staging deploy (max 30 min)
        run: |
          echo "Polling Jenkins staging deployment (max 30 minutes)..."
          # 60 attempts × 30 seconds = 1800 seconds = 30 minutes
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              ${{ secrets.STAGING_HEALTH_URL }}/actuator/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Staging is healthy (attempt $i/60)"
              exit 0
            fi
            echo "Attempt $i/60: staging not ready (status: $STATUS), waiting 30s..."
            sleep 30
          done
          echo "✗ Jenkins deploy timeout after 30 minutes (60 attempts exceeded)"
          exit 1

  e2e-tests:
    name: E2E Tests against Staging
    runs-on: ubuntu-latest
    needs: trigger-jenkins-staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run E2E tests against staging
        run: |
          ./gradlew :tests:e2e:test \
            -Dauth.service.url=${{ secrets.STAGING_HEALTH_URL }} \
            -Dgateway.service.url=${{ secrets.STAGING_HEALTH_URL }}
        env:
          E2E_BASE_URL: ${{ secrets.STAGING_HEALTH_URL }}
          AZ_SUBSCRIPTION_ID: ${{ secrets.AZ_SUBSCRIPTION_ID }}
