name: CI — Release (Staging)

on:
  push:
    branches: ['release/**']

env:
  ACR_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  build-and-test:
    name: Build, Unit & Integration Tests + SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build all services
        run: ./gradlew bootJar --parallel -x test

      - name: Run unit tests
        run: ./gradlew unitTest --parallel

      - name: Run integration tests
        run: ./gradlew integrationTest --parallel

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport --parallel

      - name: SonarQube Analysis
        run: |
          ./gradlew sonarqube \
            -Dsonar.projectKey=circleguard \
            -Dsonar.host.url=${{ secrets.SONARQUBE_URL }} \
            -Dsonar.token=${{ secrets.SONARQUBE_TOKEN }}

  trivy-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - circleguard-auth-service
          - circleguard-identity-service
          - circleguard-promotion-service
          - circleguard-notification-service
          - circleguard-form-service
          - circleguard-gateway-service
          - circleguard-dashboard-service
          - circleguard-file-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar -x test

      - name: Build Docker image
        run: |
          JAR=$(find services/${{ matrix.service }}/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            --build-arg JAR_FILE=${JAR} \
            -t ${{ matrix.service }}:scan .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.service }}:scan'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

  push-to-acr:
    name: Push Staging Images to ACR
    runs-on: ubuntu-latest
    needs: [build-and-test, trivy-scan]
    strategy:
      matrix:
        service:
          - circleguard-auth-service
          - circleguard-identity-service
          - circleguard-promotion-service
          - circleguard-notification-service
          - circleguard-form-service
          - circleguard-gateway-service
          - circleguard-dashboard-service
          - circleguard-file-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar -x test

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push staging image
        run: |
          JAR=$(find services/${{ matrix.service }}/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/circleguard/${{ matrix.service }}:staging-${{ steps.vars.outputs.SHORT_SHA }}"
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            --build-arg JAR_FILE=${JAR} \
            -t ${IMAGE} \
            --label "git.sha=${GITHUB_SHA}" \
            --label "git.branch=${GITHUB_REF_NAME}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .
          docker push ${IMAGE}
          echo "Pushed: ${IMAGE}"

  trigger-jenkins-staging:
    name: Trigger Jenkins CD — Staging
    runs-on: ubuntu-latest
    needs: push-to-acr
    steps:
      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Trigger Jenkins Staging Pipeline
        env:
          JENKINS_URL: ${{ secrets.JENKINS_STAGING_URL }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
        run: |
          if [ -z "$JENKINS_URL" ]; then
            echo "JENKINS_STAGING_URL not configured — skipping trigger"
            exit 0
          fi
          COOKIE_JAR=$(mktemp)
          CRUMB=$(curl -s -c "$COOKIE_JAR" --user "ci:$JENKINS_TOKEN" \
            "$JENKINS_URL/crumbIssuer/api/json" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['crumbRequestField']+':'+d['crumb'])")
          if [ -z "$CRUMB" ]; then
            echo "ERROR: no se pudo obtener el CSRF crumb de Jenkins"
            rm -f "$COOKIE_JAR"
            exit 1
          fi
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -b "$COOKIE_JAR" \
            --connect-timeout 10 --max-time 30 \
            -X POST "$JENKINS_URL/job/circleguard-staging/buildWithParameters" \
            --user "ci:$JENKINS_TOKEN" \
            -H "$CRUMB" \
            --data-urlencode "IMAGE_TAG=staging-${{ steps.vars.outputs.SHORT_SHA }}")
          rm -f "$COOKIE_JAR"
          echo "Jenkins response: $RESPONSE"
          if [ "$RESPONSE" != "201" ]; then
            echo "Failed to trigger Jenkins staging pipeline (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Wait for staging to become healthy (max 15 min)
        env:
          STAGING_HEALTH_URL: ${{ secrets.STAGING_HEALTH_URL }}
        run: |
          if [ -z "$STAGING_HEALTH_URL" ]; then
            echo "STAGING_HEALTH_URL not configured — skipping health check"
            exit 0
          fi
          echo "Polling staging health endpoint (max 15 minutes)..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "$STAGING_HEALTH_URL/actuator/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Staging healthy (attempt $i/30)"
              exit 0
            fi
            echo "Attempt $i/30: not ready yet (HTTP $STATUS), waiting 30s..."
            sleep 30
          done
          echo "✗ Staging did not become healthy after 15 minutes"
          exit 1

  e2e-tests:
    name: E2E Tests against Staging
    runs-on: ubuntu-latest
    needs: trigger-jenkins-staging
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run E2E tests against staging
        env:
          E2E_BASE_URL: ${{ secrets.STAGING_HEALTH_URL }}
        run: |
          if [ -z "$E2E_BASE_URL" ]; then
            echo "STAGING_HEALTH_URL not configured — skipping E2E tests"
            exit 0
          fi
          ./gradlew e2eTest
