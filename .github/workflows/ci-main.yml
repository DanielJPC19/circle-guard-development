name: CI — Main (Production)

on:
  push:
    branches: [main]

env:
  ACR_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  build-and-test:
    name: Build, Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build all services
        run: ./gradlew bootJar --parallel -x test

      - name: Run unit tests
        run: ./gradlew unitTest --parallel

      - name: Run integration tests
        run: ./gradlew integrationTest --parallel

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport --parallel

      - name: SonarQube Analysis
        run: |
          ./gradlew sonarqube \
            -Dsonar.projectKey=circleguard \
            -Dsonar.host.url=${{ secrets.SONARQUBE_URL }} \
            -Dsonar.token=${{ secrets.SONARQUBE_TOKEN }}

  trivy-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      security-events: write
    strategy:
      matrix:
        service:
          - circleguard-auth-service
          - circleguard-identity-service
          - circleguard-promotion-service
          - circleguard-notification-service
          - circleguard-form-service
          - circleguard-gateway-service
          - circleguard-dashboard-service
          - circleguard-file-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar -x test

      - name: Build Docker image
        run: |
          JAR=$(find services/${{ matrix.service }}/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            --build-arg JAR_FILE=${JAR} \
            -t ${{ matrix.service }}:scan .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.service }}:scan'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

  owasp-zap:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check STAGING_HEALTH_URL
        id: check-url
        env:
          URL: ${{ secrets.STAGING_HEALTH_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "STAGING_HEALTH_URL not configured — skipping OWASP ZAP scan"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: OWASP ZAP Full Scan (against staging)
        if: steps.check-url.outputs.skip != 'true'
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: '${{ secrets.STAGING_HEALTH_URL }}'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          artifact_name: 'zap-report'
          fail_action: false

  push-to-acr:
    name: Push Production Images to ACR
    runs-on: ubuntu-latest
    needs: [build-and-test, trivy-scan, owasp-zap]
    outputs:
      short_sha: ${{ steps.vars.outputs.SHORT_SHA }}
    strategy:
      matrix:
        service:
          - circleguard-auth-service
          - circleguard-identity-service
          - circleguard-promotion-service
          - circleguard-notification-service
          - circleguard-form-service
          - circleguard-gateway-service
          - circleguard-dashboard-service
          - circleguard-file-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar -x test

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push production image
        run: |
          JAR=$(find services/${{ matrix.service }}/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          SHORT_SHA="${{ steps.vars.outputs.SHORT_SHA }}"
          PROD_TAG="${{ secrets.ACR_LOGIN_SERVER }}/circleguard/${{ matrix.service }}:prod-${SHORT_SHA}"
          PROD_LATEST_TAG="${{ secrets.ACR_LOGIN_SERVER }}/circleguard/${{ matrix.service }}:prod-latest"
          LATEST_TAG="${{ secrets.ACR_LOGIN_SERVER }}/circleguard/${{ matrix.service }}:latest"
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            --build-arg JAR_FILE=${JAR} \
            -t ${PROD_TAG} \
            -t ${PROD_LATEST_TAG} \
            -t ${LATEST_TAG} \
            --label "git.sha=${GITHUB_SHA}" \
            --label "git.branch=${GITHUB_REF_NAME}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .
          docker push ${PROD_TAG}
          docker push ${PROD_LATEST_TAG}
          docker push ${LATEST_TAG}
          echo "Pushed: ${PROD_TAG}"

  performance-tests:
    name: Performance Tests (Locust)
    runs-on: ubuntu-latest
    needs: push-to-acr
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check STAGING_HEALTH_URL
        id: check-url
        env:
          URL: ${{ secrets.STAGING_HEALTH_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "STAGING_HEALTH_URL not configured — skipping performance tests"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check-url.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Locust
        if: steps.check-url.outputs.skip != 'true'
        run: pip install locust

      - name: Run performance tests against staging
        if: steps.check-url.outputs.skip != 'true'
        run: |
          mkdir -p results
          locust -f tests/performance/locustfile.py \
            --host=${{ secrets.STAGING_HEALTH_URL }} \
            --users=50 --spawn-rate=5 --run-time=5m \
            --headless --csv=results/locust

      - name: Validate error rate threshold (5%)
        if: steps.check-url.outputs.skip != 'true'
        run: |
          # Read Locust CSV summary and calculate error rate
          CSV_FILE="results/locust_stats.csv"
          if [ ! -f "$CSV_FILE" ]; then
            echo "Error: Locust stats file not found"
            exit 1
          fi

          # Skip header and sum up requests and failures
          TOTAL_REQUESTS=$(tail -n +2 "$CSV_FILE" | awk -F',' '{sum+=$2} END {print sum}')
          TOTAL_FAILURES=$(tail -n +2 "$CSV_FILE" | awk -F',' '{sum+=$3} END {print sum}')

          if [ "$TOTAL_REQUESTS" -eq 0 ]; then
            echo "Error: No requests recorded in Locust test"
            exit 1
          fi

          ERROR_RATE=$(echo "scale=2; ($TOTAL_FAILURES / $TOTAL_REQUESTS) * 100" | bc)
          THRESHOLD=5

          echo "==> Performance Test Results:"
          echo "    Total Requests: $TOTAL_REQUESTS"
          echo "    Total Failures: $TOTAL_FAILURES"
          echo "    Error Rate: ${ERROR_RATE}%"
          echo "    Threshold: ${THRESHOLD}%"

          if (( $(echo "$ERROR_RATE > $THRESHOLD" | bc -l) )); then
            echo "✗ Error rate exceeds 5% threshold (${ERROR_RATE}% > ${THRESHOLD}%)"
            exit 1
          else
            echo "✓ Error rate is within acceptable threshold"
            exit 0
          fi

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-results
          path: results/

  release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    needs: push-to-acr
    continue-on-error: true
    outputs:
      new_version: ${{ steps.semver.outputs.NEW_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine semantic version
        id: semver
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
            MAJOR=0; MINOR=0; PATCH=0
          else
            RANGE="${LAST_TAG}..HEAD"
            MAJOR=$(echo $LAST_TAG | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo $LAST_TAG | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo $LAST_TAG | sed 's/v//' | cut -d. -f3)
          fi

          COMMITS=$(git log ${RANGE} --oneline 2>/dev/null || echo "")

          if echo "$COMMITS" | grep -qE "BREAKING CHANGE|feat!:"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qE "^[a-f0-9]+ feat"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "New version: ${NEW_TAG}"

      - name: Generate release notes from git log
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
            DISPLAY_TAG="inicio del proyecto"
          else
            RANGE="${LAST_TAG}..HEAD"
            DISPLAY_TAG="${LAST_TAG}"
          fi
          cat > release-notes.md << 'RELEASE_EOF'
          ## CircleGuard ${{ steps.semver.outputs.NEW_TAG }}

          Sistema universitario de rastreo de contactos basado en microservicios.
          Desplegado sobre Azure AKS (staging) y GKE (prod).

          ---

          ### Microservicios

          | Servicio | Puerto | Responsabilidad |
          |---|---|---|
          | auth-service | 8180 | Login LDAP/local, emisión de JWT y tokens QR de corta duración |
          | gateway-service | 8087 | Punto de entrada para tráfico móvil; validación JWT/QR y rate-limiting con Redis |
          | identity-service | 8083 | Gestión de identidades anónimas cifradas; publica eventos a Kafka |
          | promotion-service | 8088 | Grafo de contactos (Neo4j), infraestructura espacial, ciclo de vida de estado de salud y gestión de círculos |
          | form-service | 8086 | Encuestas de salud y adjuntos; publica `survey.submitted` a Kafka |
          | notification-service | 8082 | Consumidor Kafka para alertas de exposición, cercado geográfico y notificaciones prioritarias |
          | dashboard-service | 8084 | Analítica para administradores con filtrado k-anonimato |
          | file-service | 8085 | Carga/descarga de adjuntos de encuestas |

          ### Mobile App

          Aplicación React Native / Expo con autenticación, escaneo QR para check-in en campus,
          envío de encuestas de salud, vista de círculos de contacto y panel de administración
          con analítica y mapeo espacial de pisos.

          ### Infraestructura

          - **Multi-cloud:** dev en Digital Ocean (DOKS), staging en Azure AKS, prod en GCP GKE
          - **Middleware en K8s:** PostgreSQL 16 (StatefulSet), Neo4j, Kafka + Zookeeper, Redis, OpenLDAP
          - **Seguridad:** Sealed Secrets, Spring Security + JWT, cifrado de identidades (AesBytesEncryptor)
          - **Escalado:** HPA 2–8 réplicas; rollback automático ante fallo de rollout

          ### Pruebas

          - Unit tests (JUnit 5 + Mockito) — cobertura mínima 70% por JaCoCo
          - Integration tests (Testcontainers — PostgreSQL, Neo4j, Redis reales)
          - E2E tests (REST Assured contra staging)
          - Performance tests (Locust): 50 usuarios, 5 minutos, umbral < 5% error rate

          ---

          RELEASE_EOF

          echo "### Cambios desde ${DISPLAY_TAG}" >> release-notes.md
          echo "" >> release-notes.md
          git log ${RANGE} --pretty=format:"- %s (%h)" >> release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  manual-approval:
    name: Manual Approval for Production
    runs-on: ubuntu-latest
    needs: [performance-tests, release-notes]
    environment:
      name: production
    steps:
      - name: Awaiting approval
        run: echo "Production deployment approved. Proceeding..."

  trigger-jenkins-prod:
    name: Trigger Jenkins CD — Production
    runs-on: ubuntu-latest
    needs: [manual-approval, release-notes]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Trigger Jenkins Production Pipeline
        env:
          JENKINS_URL: ${{ secrets.JENKINS_PROD_URL }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
        run: |
          if [ -z "$JENKINS_URL" ]; then
            echo "JENKINS_PROD_URL not configured — skipping trigger"
            exit 0
          fi
          COOKIE_JAR=$(mktemp)
          CRUMB=$(curl -s -c "$COOKIE_JAR" --user "ci:$JENKINS_TOKEN" \
            "$JENKINS_URL/crumbIssuer/api/json" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['crumbRequestField']+':'+d['crumb'])")
          if [ -z "$CRUMB" ]; then
            echo "ERROR: no se pudo obtener el CSRF crumb de Jenkins"
            rm -f "$COOKIE_JAR"
            exit 1
          fi
          RESPONSE_BODY=$(mktemp)
          HTTP_CODE=$(curl -s -o "$RESPONSE_BODY" -w "%{http_code}" \
            -b "$COOKIE_JAR" \
            --connect-timeout 10 --max-time 30 \
            -X POST "$JENKINS_URL/job/circleguard-prod/buildWithParameters" \
            --user "ci:$JENKINS_TOKEN" \
            -H "$CRUMB" \
            --data-urlencode "IMAGE_TAG=prod-${{ steps.vars.outputs.SHORT_SHA }}" \
            --data-urlencode "ENVIRONMENT=production")
          echo "Jenkins HTTP: $HTTP_CODE"
          echo "Jenkins body: $(cat $RESPONSE_BODY)"
          rm -f "$RESPONSE_BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "Jenkins trigger exitoso"
            rm -f "$COOKIE_JAR"
            exit 0
          fi
          if [ "$HTTP_CODE" = "400" ]; then
            echo "Fallback: job no parametrizado aún — iniciando primera ejecución con /build..."
            CRUMB2=$(curl -s -c "$COOKIE_JAR" --user "ci:$JENKINS_TOKEN" \
              "$JENKINS_URL/crumbIssuer/api/json" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d['crumbRequestField']+':'+d['crumb'])")
            FB_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -b "$COOKIE_JAR" \
              --connect-timeout 10 --max-time 30 \
              -X POST "$JENKINS_URL/job/circleguard-prod/build" \
              --user "ci:$JENKINS_TOKEN" \
              -H "$CRUMB2")
            echo "Fallback /build HTTP: $FB_CODE"
            if [ "$FB_CODE" = "201" ]; then
              echo "Primera ejecución iniciada — parámetros registrados."
              rm -f "$COOKIE_JAR"
              exit 0
            fi
          fi
          rm -f "$COOKIE_JAR"
          echo "Failed to trigger Jenkins production pipeline (HTTP $HTTP_CODE)"
          exit 1

      - name: Wait for Jenkins Production (40 intentos × 60s)
        run: |
          echo "Esperando 30s para que Jenkins registre el build..."
          sleep 30
          for i in $(seq 1 40); do
            echo "Intento $i/40..."
            RESULT=$(curl -sf \
              "${{ secrets.JENKINS_PROD_URL }}/job/circleguard-prod/lastBuild/api/json" \
              --user "ci:${{ secrets.JENKINS_TOKEN }}" | \
              python3 -c "import sys,json; b=json.load(sys.stdin); print(b.get('result') or 'RUNNING')" \
              2>/dev/null || echo "CONNECTING")
            echo "Estado Jenkins: $RESULT"
            if [ "$RESULT" = "SUCCESS" ]; then
              echo "Despliegue a producción exitoso"
              exit 0
            elif [ "$RESULT" = "FAILURE" ] || [ "$RESULT" = "ABORTED" ] || [ "$RESULT" = "UNSTABLE" ]; then
              echo "Jenkins reportó fallo: $RESULT"
              exit 1
            fi
            sleep 60
          done
          echo "Error: Jenkins no completó tras 40 intentos (40 min)"
          exit 1

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [trigger-jenkins-prod, release-notes]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download Locust performance results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: locust-results
          path: locust-results/

      - name: Create git tag
        run: |
          git config user.email "ci@circleguard.edu"
          git config user.name "CI Bot"
          git tag ${{ needs.release-notes.outputs.new_version }}
          git push origin ${{ needs.release-notes.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-notes.outputs.new_version }}
          name: CircleGuard ${{ needs.release-notes.outputs.new_version }}
          body_path: release-notes.md
          files: |
            locust-results/*.csv
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
