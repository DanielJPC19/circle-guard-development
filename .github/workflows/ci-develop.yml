name: CI — Develop

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  ACR_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  SERVICES: >-
    circleguard-auth-service
    circleguard-identity-service
    circleguard-promotion-service
    circleguard-notification-service
    circleguard-form-service
    circleguard-gateway-service
    circleguard-dashboard-service
    circleguard-file-service

jobs:
  build-and-test:
    name: Build, Unit Tests & SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build all services
        run: ./gradlew bootJar --parallel -x test

      - name: Run unit tests
        run: ./gradlew unitTest --parallel

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport --parallel

      - name: SonarQube Analysis
        run: |
          ./gradlew sonarqube \
            -Dsonar.projectKey=circleguard \
            -Dsonar.host.url=${{ secrets.SONARQUBE_URL }} \
            -Dsonar.token=${{ secrets.SONARQUBE_TOKEN }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

  trivy-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        service:
          - circleguard-auth-service
          - circleguard-identity-service
          - circleguard-promotion-service
          - circleguard-notification-service
          - circleguard-form-service
          - circleguard-gateway-service
          - circleguard-dashboard-service
          - circleguard-file-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar -x test

      - name: Build Docker image
        run: |
          JAR=$(find services/${{ matrix.service }}/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            --build-arg JAR_FILE=${JAR} \
            -t ${{ matrix.service }}:scan \
            .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.service }}:scan'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

  push-to-acr:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: [build-and-test, trivy-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        service:
          - circleguard-auth-service
          - circleguard-identity-service
          - circleguard-promotion-service
          - circleguard-notification-service
          - circleguard-form-service
          - circleguard-gateway-service
          - circleguard-dashboard-service
          - circleguard-file-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar -x test

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          JAR=$(find services/${{ matrix.service }}/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/circleguard/${{ matrix.service }}:dev-${{ steps.vars.outputs.SHORT_SHA }}"
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            --build-arg JAR_FILE=${JAR} \
            -t ${IMAGE} \
            --label "git.sha=${GITHUB_SHA}" \
            --label "git.branch=${GITHUB_REF_NAME}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .
          docker push ${IMAGE}
          echo "Pushed: ${IMAGE}"
